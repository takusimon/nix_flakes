##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

#Adjust Blur and opacity for specific apps
windowrule = opacity 100.0 $& 100.0 $& 100.0,match:class ^(firefox),match:title ^(.*YouTube.*)$
windowrule = no_blur on,match:class ^(firefox),match:title ^(.*YouTube.*)$

# Set Persistent workspaces i.e always there regardless of content
workspace = 1,m[eDP-1],default:true,persistent:true 
workspace = 2,m[eDP-1],persistent:true
worksapce = 3,m[eDP-1],persistent:true
